openapi: 3.1.0
info:
  title: modmono
  description: HTTP API for the modmono service (products, customers, orders, and health probes).
  version: 0.2.0
servers:
  - url: http://localhost:8080

paths:

  # ── Products ────────────────────────────────────────────────────────────────

  /products:
    post:
      summary: Create a product
      operationId: createProduct
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'

    get:
      summary: List active products
      operationId: listProducts
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Active products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

  /products/inactive:
    get:
      summary: List inactive products
      operationId: listInactiveProducts
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Inactive products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

  /products/{id}:
    get:
      summary: Get product detail
      operationId: getProduct
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /products/{id}/deactivate:
    post:
      summary: Deactivate a product
      operationId: deactivateProduct
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Product deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /products/{id}/activate:
    post:
      summary: Activate a product
      operationId: activateProduct
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Product activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Customers ───────────────────────────────────────────────────────────────

  /customers:
    post:
      summary: Create a customer
      operationId: createCustomer
      tags: [Customers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'

    get:
      summary: List active customers
      operationId: listCustomers
      tags: [Customers]
      parameters:
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Active customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'

  /customers/inactive:
    get:
      summary: List inactive customers
      operationId: listInactiveCustomers
      tags: [Customers]
      parameters:
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Inactive customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'

  /customers/{id}:
    get:
      summary: Get customer detail
      operationId: getCustomer
      tags: [Customers]
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Customer found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /customers/{id}/deactivate:
    post:
      summary: Deactivate a customer
      operationId: deactivateCustomer
      tags: [Customers]
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Customer deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Orders ──────────────────────────────────────────────────────────────────

  /orders:
    post:
      summary: Place an order
      operationId: placeOrder
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order placed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'

    get:
      summary: List active orders
      operationId: listOrders
      tags: [Orders]
      parameters:
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Active orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

  /orders/inactive:
    get:
      summary: List inactive (deactivated) orders
      operationId: listInactiveOrders
      tags: [Orders]
      parameters:
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Inactive orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

  /orders/payment-completed:
    get:
      summary: List payment-completed orders
      operationId: listPaymentCompletedOrders
      tags: [Orders]
      parameters:
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Payment-completed orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

  /orders/products:
    get:
      summary: List active products available for ordering
      operationId: listOrderProducts
      tags: [Orders]
      parameters:
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Available products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogProduct'

  /orders/customers:
    get:
      summary: List active customers available for ordering
      operationId: listOrderCustomers
      tags: [Orders]
      parameters:
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Available customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogCustomer'

  /orders/{id}:
    get:
      summary: Get order detail
      operationId: getOrder
      tags: [Orders]
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderView'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{id}/complete-payment:
    post:
      summary: Complete payment for an order
      operationId: completePayment
      tags: [Orders]
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '201':
          description: Payment completed — new order record created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /orders/{id}/deactivate:
    post:
      summary: Deactivate an order
      operationId: deactivateOrder
      tags: [Orders]
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Order deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Health ──────────────────────────────────────────────────────────────────

  /health/live:
    get:
      summary: Liveness probe
      operationId: healthLive
      tags: [Health]
      responses:
        '200':
          description: Service is alive

  /health/ready:
    get:
      summary: Readiness probe
      operationId: healthReady
      tags: [Health]
      responses:
        '200':
          description: Service is ready
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:

  parameters:
    id:
      name: id
      in: path
      required: true
      description: 24-character hex MongoDB ObjectID
      schema:
        type: string
        pattern: '^[0-9a-f]{24}$'
        example: '507f1f77bcf86cd799439011'

    limit:
      name: limit
      in: query
      required: false
      description: Maximum number of results to return
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Conflict:
      description: Conflict — resource already in target state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:

    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # ── Product schemas ──────────────────────────────────────────────────────

    Product:
      type: object
      required: [id, sku, name, price, status, created_at]
      properties:
        id:
          type: string
        sku:
          type: string
        name:
          type: string
        price:
          type: number
          format: double
          minimum: 0
        status:
          type: string
          enum: [active, deactivated]
        original_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        deactivated_at:
          type: string
          format: date-time
          nullable: true

    CreateProductRequest:
      type: object
      required: [sku, name, price]
      properties:
        sku:
          type: string
        name:
          type: string
        price:
          type: number
          format: double
          minimum: 0

    # ── Customer schemas ─────────────────────────────────────────────────────

    Customer:
      type: object
      required: [id, name, email, status, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, deactivated]
        original_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        deactivated_at:
          type: string
          format: date-time
          nullable: true

    CreateCustomerRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string

    # ── Order schemas ────────────────────────────────────────────────────────

    LineItem:
      type: object
      required: [sku, quantity, unit_price]
      properties:
        sku:
          type: string
        quantity:
          type: integer
          minimum: 1
        unit_price:
          type: number
          format: double
          minimum: 0

    LineItemInput:
      type: object
      required: [sku, quantity, unit_price]
      properties:
        sku:
          type: string
        quantity:
          type: integer
          minimum: 1
        unit_price:
          type: number
          format: double
          minimum: 0

    LineItemView:
      type: object
      required: [sku, quantity, unit_price]
      properties:
        sku:
          type: string
        product_name:
          type: string
          nullable: true
        quantity:
          type: integer
          minimum: 1
        unit_price:
          type: number
          format: double
          minimum: 0

    Order:
      type: object
      required: [id, items, total, created_at]
      properties:
        id:
          type: string
        customer_id:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
        total:
          type: number
          format: double
        status:
          type: string
          nullable: true
        original_order_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        deactivated_at:
          type: string
          format: date-time
          nullable: true

    OrderView:
      type: object
      required: [id, items, total, created_at]
      properties:
        id:
          type: string
        customer_id:
          type: string
          nullable: true
        customer_name:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/LineItemView'
        total:
          type: number
          format: double
        status:
          type: string
          nullable: true
        original_order_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        deactivated_at:
          type: string
          format: date-time
          nullable: true

    CreateOrderRequest:
      type: object
      required: [items]
      properties:
        customer_id:
          type: string
          description: 24-character hex MongoDB ObjectID
          pattern: '^[0-9a-f]{24}$'
          nullable: true
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LineItemInput'

    # ── Catalog schemas (order creation helpers) ─────────────────────────────

    CatalogProduct:
      type: object
      required: [sku, name, price]
      properties:
        sku:
          type: string
        name:
          type: string
        price:
          type: number
          format: double
          minimum: 0

    CatalogCustomer:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        phone:
          type: string
          nullable: true
