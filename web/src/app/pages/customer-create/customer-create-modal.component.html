<div class="modal-backdrop" (click)="close()"></div>

<div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <header class="modal-header">
    <h2 id="modal-title">Add customer</h2>
    <button type="button" class="close-btn" (click)="close()" aria-label="Close">✕</button>
  </header>

  @if (error()) {
    <div class="banner banner-error" role="alert">{{ error() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="fields">
      <label class="field">
        <span class="label">Name</span>
        <input class="input" type="text" formControlName="name" autocomplete="name" />
        @if (form.controls.name.touched && form.controls.name.invalid) {
          <span class="field-error">Name is required.</span>
        }
      </label>

      <label class="field">
        <span class="label">Email</span>
        <input class="input" type="email" formControlName="email" autocomplete="email" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <span class="field-error">Enter a valid email.</span>
        }
      </label>
    </div>

    <div class="actions">
      <button class="btn btn-primary" type="submit" [disabled]="submitting()">
        {{ submitting() ? 'Creating…' : 'Create customer' }}
      </button>
      <button type="button" class="btn btn-ghost" (click)="close()">Cancel</button>
    </div>
  </form>
</div>
